name: Quality Control

on:
  pull_request:
    branches: [ "*" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7

    - name: Formatting
      run: cargo fmt --check

    - name: Linting
      run: cargo clippy --all-targets --all-features

    - name: Run tests
      run: cargo test --verbose